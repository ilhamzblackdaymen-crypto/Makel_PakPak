<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Sejarah Dunia</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --gold: #d4a017;
        --gold-light: #f0c040;
        --dark: #0d0b07;
        --dark2: #1a1710;
        --dark3: #242018;
        --parchment: #f5ead6;
        --cream: #ede0c4;
        --text: #f0e6cc;
        --radius: 12px;
      }
      body {
        font-family: "Lato", sans-serif;
        background: var(--dark);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 24px 16px 60px;
        background-image:
          radial-gradient(
            ellipse at 20% 10%,
            rgba(212, 160, 23, 0.07) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 90%,
            rgba(139, 32, 32, 0.08) 0%,
            transparent 50%
          ),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23d4a017' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }
      /* HEADER */
      header {
        text-align: center;
        margin-bottom: 28px;
        animation: fadeDown 0.8s ease both;
      }
      .header-icon {
        font-size: 3rem;
        display: block;
        margin-bottom: 8px;
        animation: pulse 3s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          filter: drop-shadow(0 0 8px rgba(212, 160, 23, 0.4));
        }
        50% {
          filter: drop-shadow(0 0 20px rgba(212, 160, 23, 0.8));
        }
      }
      h1 {
        font-family: "Cinzel", serif;
        font-size: clamp(1.8rem, 5vw, 3rem);
        font-weight: 900;
        letter-spacing: 3px;
        text-transform: uppercase;
        background: linear-gradient(
          135deg,
          var(--gold-light),
          var(--gold),
          #a07010
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        font-size: 0.85rem;
        color: rgba(212, 160, 23, 0.6);
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-top: 6px;
      }
      .divider {
        width: 200px;
        height: 2px;
        background: linear-gradient(
          to right,
          transparent,
          var(--gold),
          transparent
        );
        margin: 14px auto;
      }
      /* CARD */
      .card {
        background: linear-gradient(145deg, var(--dark2), var(--dark3));
        border: 1px solid rgba(212, 160, 23, 0.25);
        border-radius: var(--radius);
        width: 100%;
        max-width: 680px;
        padding: 36px 32px;
        box-shadow:
          0 8px 40px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(212, 160, 23, 0.1);
        animation: fadeUp 0.7s ease both;
      }
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* DIFFICULTY */
      .section-label {
        font-family: "Cinzel", serif;
        font-size: 0.75rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 14px;
      }
      .difficulty-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 32px;
      }
      .diff-btn {
        padding: 16px 8px;
        border: 2px solid rgba(212, 160, 23, 0.3);
        border-radius: var(--radius);
        background: transparent;
        color: var(--text);
        font-family: "Cinzel", serif;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.25s ease;
        text-align: center;
      }
      .diff-btn .diff-icon {
        display: block;
        font-size: 1.8rem;
        margin-bottom: 6px;
      }
      .diff-btn .diff-name {
        display: block;
        font-size: 0.8rem;
        letter-spacing: 1px;
      }
      .diff-btn .diff-desc {
        display: block;
        font-size: 0.65rem;
        opacity: 0.6;
        margin-top: 2px;
        font-family: "Lato", sans-serif;
      }
      .diff-btn:hover {
        border-color: var(--gold);
        background: rgba(212, 160, 23, 0.08);
        transform: translateY(-2px);
      }
      .diff-btn.easy.active {
        border-color: #4caf50;
        background: rgba(76, 175, 80, 0.15);
        box-shadow: 0 0 16px rgba(76, 175, 80, 0.2);
      }
      .diff-btn.medium.active {
        border-color: var(--gold);
        background: rgba(212, 160, 23, 0.15);
        box-shadow: 0 0 16px rgba(212, 160, 23, 0.2);
      }
      .diff-btn.hard.active {
        border-color: #e53935;
        background: rgba(229, 57, 53, 0.15);
        box-shadow: 0 0 16px rgba(229, 57, 53, 0.2);
      }
      /* START BTN */
      .btn-start {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #b8860b, var(--gold), #b8860b);
        color: var(--dark);
        font-family: "Cinzel", serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(212, 160, 23, 0.3);
      }
      .btn-start:hover:not(:disabled) {
        background: linear-gradient(
          135deg,
          var(--gold-light),
          #f5d060,
          var(--gold-light)
        );
        box-shadow: 0 6px 28px rgba(212, 160, 23, 0.5);
        transform: translateY(-2px);
      }
      .btn-start:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      /* QUIZ */
      #quiz-screen {
        display: none;
      }
      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-size: 0.8rem;
        color: rgba(212, 160, 23, 0.7);
        letter-spacing: 1px;
      }
      .badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.7rem;
        font-family: "Cinzel", serif;
        letter-spacing: 1px;
      }
      .badge.easy {
        background: rgba(76, 175, 80, 0.2);
        border: 1px solid #4caf50;
        color: #81c784;
      }
      .badge.medium {
        background: rgba(212, 160, 23, 0.2);
        border: 1px solid var(--gold);
        color: var(--gold-light);
      }
      .badge.hard {
        background: rgba(229, 57, 53, 0.2);
        border: 1px solid #e53935;
        color: #ef9a9a;
      }
      .progress-wrap {
        height: 6px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        margin-bottom: 28px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(to right, var(--gold), var(--gold-light));
        border-radius: 999px;
        transition: width 0.4s ease;
      }
      .question-num {
        font-size: 0.75rem;
        color: rgba(212, 160, 23, 0.5);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .question-text {
        font-family: "Cinzel", serif;
        font-size: clamp(1rem, 3vw, 1.2rem);
        line-height: 1.6;
        color: var(--parchment);
        margin-bottom: 28px;
        min-height: 60px;
      }
      .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 24px;
      }
      .option-btn {
        padding: 14px 16px;
        border: 1.5px solid rgba(212, 160, 23, 0.2);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font-family: "Lato", sans-serif;
        font-size: 0.9rem;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s ease;
        line-height: 1.4;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .option-btn .opt-letter {
        min-width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 1.5px solid rgba(212, 160, 23, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Cinzel", serif;
        font-size: 0.7rem;
        font-weight: 700;
        flex-shrink: 0;
      }
      .option-btn:hover:not(:disabled) {
        border-color: var(--gold);
        background: rgba(212, 160, 23, 0.08);
        transform: translateX(4px);
      }
      .option-btn.correct {
        border-color: #4caf50;
        background: rgba(76, 175, 80, 0.15);
        color: #a5d6a7;
      }
      .option-btn.correct .opt-letter {
        border-color: #4caf50;
        background: rgba(76, 175, 80, 0.3);
      }
      .option-btn.wrong {
        border-color: #e53935;
        background: rgba(229, 57, 53, 0.12);
        color: #ef9a9a;
      }
      .option-btn.wrong .opt-letter {
        border-color: #e53935;
        background: rgba(229, 57, 53, 0.2);
      }
      .option-btn:disabled {
        cursor: not-allowed;
      }
      .feedback-box {
        min-height: 44px;
        border-radius: var(--radius);
        padding: 10px 16px;
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .feedback-box.show {
        opacity: 1;
      }
      .feedback-box.correct-fb {
        background: rgba(76, 175, 80, 0.1);
        border: 1px solid rgba(76, 175, 80, 0.3);
        color: #a5d6a7;
      }
      .feedback-box.wrong-fb {
        background: rgba(229, 57, 53, 0.1);
        border: 1px solid rgba(229, 57, 53, 0.3);
        color: #ef9a9a;
      }
      .btn-next {
        width: 100%;
        padding: 14px;
        border: 2px solid var(--gold);
        border-radius: var(--radius);
        background: transparent;
        color: var(--gold);
        font-family: "Cinzel", serif;
        font-size: 0.9rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.25s ease;
        display: none;
      }
      .btn-next:hover {
        background: rgba(212, 160, 23, 0.12);
        transform: translateY(-2px);
      }
      .btn-next.visible {
        display: block;
      }
      /* RESULT */
      #result-screen {
        display: none;
        text-align: center;
      }
      .trophy {
        font-size: 5rem;
        display: block;
        margin-bottom: 16px;
        animation: bounce 1s ease 0.3s both;
      }
      @keyframes bounce {
        0% {
          transform: scale(0) rotate(-15deg);
          opacity: 0;
        }
        60% {
          transform: scale(1.15) rotate(5deg);
          opacity: 1;
        }
        80% {
          transform: scale(0.95) rotate(-3deg);
        }
        100% {
          transform: scale(1) rotate(0);
        }
      }
      .result-title {
        font-family: "Cinzel", serif;
        font-size: 1.8rem;
        color: var(--gold-light);
        margin-bottom: 8px;
      }
      .score-display {
        font-family: "Cinzel", serif;
        font-size: 4rem;
        font-weight: 900;
        background: linear-gradient(135deg, var(--gold-light), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin: 20px 0 4px;
      }
      .score-label {
        color: rgba(212, 160, 23, 0.6);
        font-size: 0.85rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .result-message {
        margin: 20px 0 28px;
        font-size: 1rem;
        color: var(--cream);
        line-height: 1.6;
        opacity: 0.85;
      }
      .stats-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 0 0 30px;
      }
      .stat-box {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(212, 160, 23, 0.2);
        border-radius: var(--radius);
        padding: 14px 20px;
        min-width: 90px;
      }
      .stat-box .stat-val {
        font-family: "Cinzel", serif;
        font-size: 1.6rem;
        color: var(--gold-light);
      }
      .stat-box .stat-key {
        font-size: 0.7rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: rgba(212, 160, 23, 0.5);
        margin-top: 2px;
      }
      .btn-restart {
        padding: 14px 40px;
        background: linear-gradient(135deg, #b8860b, var(--gold));
        color: var(--dark);
        font-family: "Cinzel", serif;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(212, 160, 23, 0.3);
      }
      .btn-restart:hover {
        box-shadow: 0 6px 28px rgba(212, 160, 23, 0.5);
        transform: translateY(-2px);
      }
      @media (max-width: 480px) {
        .card {
          padding: 24px 16px;
        }
        .options-grid {
          grid-template-columns: 1fr;
        }
        .difficulty-grid {
          grid-template-columns: 1fr;
        }
        .stats-row {
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <span class="header-icon">🏛️</span>
      <h1>Quiz Sejarah Dunia</h1>
      <p class="subtitle">Uji Pengetahuanmu</p>
      <div class="divider"></div>
    </header>

    <!-- HOME -->
    <div class="card" id="home-screen">
      <p class="section-label">Pilih Tingkat Kesulitan</p>
      <div class="difficulty-grid">
        <button
          class="diff-btn easy"
          data-level="easy"
          onclick="selectDifficulty(this)"
        >
          <span class="diff-icon">🌱</span>
          <span class="diff-name">Mudah</span>
          <span class="diff-desc">Dasar &amp; Umum · +10 poin</span>
        </button>
        <button
          class="diff-btn medium"
          data-level="medium"
          onclick="selectDifficulty(this)"
        >
          <span class="diff-icon">⚔️</span>
          <span class="diff-name">Sedang</span>
          <span class="diff-desc">Lebih Detail · +20 poin</span>
        </button>
        <button
          class="diff-btn hard"
          data-level="hard"
          onclick="selectDifficulty(this)"
        >
          <span class="diff-icon">🔥</span>
          <span class="diff-name">Sulit</span>
          <span class="diff-desc">Fakta Spesifik · +30 poin</span>
        </button>
      </div>
      <button class="btn-start" id="btn-start" disabled onclick="startQuiz()">
        ⚡ Mulai Quiz
      </button>
    </div>

    <!-- QUIZ -->
    <div class="card" id="quiz-screen">
      <div class="quiz-meta">
        <span class="badge" id="badge-level"></span>
        <span id="score-live">Skor: 0</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
      </div>
      <p class="question-num" id="question-num"></p>
      <p class="question-text" id="question-text"></p>
      <div class="options-grid" id="options-grid"></div>
      <div class="feedback-box" id="feedback-box"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">
        Pertanyaan Berikutnya →
      </button>
    </div>

    <!-- RESULT -->
    <div class="card" id="result-screen">
      <span class="trophy" id="trophy-icon">🏆</span>
      <p class="result-title" id="result-title"></p>
      <div class="score-display" id="score-display"></div>
      <p class="score-label">TOTAL SKOR</p>
      <p class="result-message" id="result-message"></p>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" id="stat-benar">0</div>
          <div class="stat-key">Benar</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-salah">0</div>
          <div class="stat-key">Salah</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-total">0</div>
          <div class="stat-key">Soal</div>
        </div>
      </div>
      <button class="btn-restart" onclick="restartQuiz()">↩ Main Lagi</button>
    </div>

    <script>
      const allQuestions = {
        easy: [
          {
            q: "Siapa penemu bola lampu listrik?",
            opts: [
              "Thomas Edison",
              "Nikola Tesla",
              "Albert Einstein",
              "Isaac Newton",
            ],
            ans: 0,
          },
          {
            q: "Di negara manakah Tembok Besar dibangun?",
            opts: ["Jepang", "India", "China", "Korea"],
            ans: 2,
          },
          {
            q: "Siapakah presiden pertama Amerika Serikat?",
            opts: [
              "Abraham Lincoln",
              "George Washington",
              "Thomas Jefferson",
              "John Adams",
            ],
            ans: 1,
          },
          {
            q: "Di negara manakah Menara Eiffel berada?",
            opts: ["Jerman", "Italia", "Spanyol", "Prancis"],
            ans: 3,
          },
          {
            q: "Pada tahun berapa Perang Dunia II berakhir?",
            opts: ["1943", "1944", "1945", "1946"],
            ans: 2,
          },
          {
            q: "Siapa ilmuwan yang merumuskan teori gravitasi?",
            opts: [
              "Galileo Galilei",
              "Isaac Newton",
              "Charles Darwin",
              "Albert Einstein",
            ],
            ans: 1,
          },
          {
            q: "Di benua manakah Mesir Kuno berada?",
            opts: ["Asia", "Eropa", "Afrika", "Amerika"],
            ans: 2,
          },
          {
            q: "Siapakah tokoh yang memimpin India meraih kemerdekaan secara damai?",
            opts: ["Nehru", "Indira Gandhi", "Mahatma Gandhi", "Subhas Bose"],
            ans: 2,
          },
          {
            q: "Perang Dingin terjadi antara dua negara adikuasa, yaitu...",
            opts: [
              "AS & China",
              "AS & Uni Soviet",
              "Inggris & Prancis",
              "Jerman & Jepang",
            ],
            ans: 1,
          },
          {
            q: "Siapa pelukis Mona Lisa yang terkenal?",
            opts: ["Michelangelo", "Raphael", "Leonardo da Vinci", "Donatello"],
            ans: 2,
          },
        ],
        medium: [
          {
            q: "Pada tahun berapa Christopher Columbus pertama kali tiba di Amerika?",
            opts: ["1488", "1492", "1498", "1502"],
            ans: 1,
          },
          {
            q: "Revolusi Industri pertama kali dimulai di negara mana?",
            opts: ["Prancis", "Jerman", "Amerika Serikat", "Inggris"],
            ans: 3,
          },
          {
            q: "Siapakah kaisar Romawi yang pertama memeluk agama Kristen?",
            opts: ["Julius Caesar", "Nero", "Konstantinus I", "Augustus"],
            ans: 2,
          },
          {
            q: "Kerajaan manakah yang dijuluki 'Imperium di mana Matahari Tidak Pernah Terbenam'?",
            opts: [
              "Imperium Romawi",
              "Imperium Mongol",
              "Kekaisaran Britania",
              "Dinasti Qing",
            ],
            ans: 2,
          },
          {
            q: "Piramida Agung Giza dibangun sebagai makam untuk firaun siapa?",
            opts: ["Ramses II", "Tutankhamun", "Khufu", "Cleopatra"],
            ans: 2,
          },
          {
            q: "Kekalahan Napoleon terjadi di pertempuran mana?",
            opts: ["Austerlitz", "Waterloo", "Trafalgar", "Borodino"],
            ans: 1,
          },
          {
            q: "Perjanjian Versailles yang mengakhiri PD I ditandatangani tahun berapa?",
            opts: ["1917", "1918", "1919", "1920"],
            ans: 2,
          },
          {
            q: "Siapakah pemimpin pertama Uni Soviet setelah Revolusi Rusia 1917?",
            opts: [
              "Joseph Stalin",
              "Leon Trotsky",
              "Vladimir Lenin",
              "Mikhail Gorbachev",
            ],
            ans: 2,
          },
          {
            q: "Peradaban manakah yang pertama kali menciptakan sistem tulisan Cuneiform?",
            opts: [
              "Mesir Kuno",
              "Yunani",
              "Mesopotamia (Sumeria)",
              "India Kuno",
            ],
            ans: 2,
          },
          {
            q: "Siapa ilmuwan yang mengembangkan teori evolusi melalui seleksi alam?",
            opts: [
              "Gregor Mendel",
              "Charles Darwin",
              "Louis Pasteur",
              "Carl Linnaeus",
            ],
            ans: 1,
          },
        ],
        hard: [
          {
            q: "Perjanjian apakah yang pada 1648 mengakhiri Perang Tiga Puluh Tahun di Eropa?",
            opts: [
              "Perjanjian Utrecht",
              "Perjanjian Westfalia",
              "Perjanjian Paris",
              "Perjanjian Vienna",
            ],
            ans: 1,
          },
          {
            q: "Kekaisaran Mongol mencapai luas terbesar di bawah kepemimpinan siapa pada abad ke-13?",
            opts: ["Kublai Khan", "Genghis Khan", "Timur Lenk", "Ögedei Khan"],
            ans: 1,
          },
          {
            q: "Operasi Barbarossa (1941) merujuk pada invasi Jerman ke negara mana?",
            opts: ["Prancis", "Polandia", "Inggris", "Uni Soviet"],
            ans: 3,
          },
          {
            q: "Siapakah tokoh yang mendirikan Kekaisaran Maurya di India kuno?",
            opts: ["Ashoka", "Chandragupta Maurya", "Bindusara", "Akbar"],
            ans: 1,
          },
          {
            q: "Siapakah tokoh yang terbunuh dalam peristiwa 'Pembunuhan Sarajevo' pemicu PD I?",
            opts: [
              "Kaiser Wilhelm II",
              "Franz Ferdinand dari Austria",
              "Tsar Nicholas II",
              "Raja George V",
            ],
            ans: 1,
          },
          {
            q: "Jalur Sutra menghubungkan Tiongkok dengan wilayah manakah?",
            opts: [
              "Afrika Sub-Sahara",
              "Amerika Selatan",
              "Mediterania & Eropa",
              "Australia",
            ],
            ans: 2,
          },
          {
            q: "Revolusi Prancis 1789 dimulai dengan penyerbuan benteng mana?",
            opts: ["Bastille", "Versailles", "Notre-Dame", "Tuileries"],
            ans: 0,
          },
          {
            q: "Siapa pemimpin Cuba yang berkuasa setelah Revolusi 1959?",
            opts: [
              "Che Guevara",
              "Raúl Castro",
              "Fulgencio Batista",
              "Fidel Castro",
            ],
            ans: 3,
          },
          {
            q: "Kota Konstantinopel jatuh ke tangan Kesultanan Ottoman pada tahun berapa?",
            opts: ["1389", "1402", "1453", "1529"],
            ans: 2,
          },
          {
            q: "Siapakah kaisar Prancis yang diasingkan ke Pulau Elba pada tahun 1814?",
            opts: [
              "Louis XVI",
              "Napoleon Bonaparte",
              "Charles X",
              "Louis XVIII",
            ],
            ans: 1,
          },
        ],
      };

      const LETTERS = ["A", "B", "C", "D"];
      let selectedLevel = null,
        questions = [],
        currentIdx = 0,
        score = 0,
        correct = 0,
        wrong = 0;

      function selectDifficulty(btn) {
        document
          .querySelectorAll(".diff-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        selectedLevel = btn.dataset.level;
        document.getElementById("btn-start").disabled = false;
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function startQuiz() {
        questions = shuffle([...allQuestions[selectedLevel]]).slice(0, 10);
        currentIdx = 0;
        score = 0;
        correct = 0;
        wrong = 0;
        document.getElementById("home-screen").style.display = "none";
        const qs = document.getElementById("quiz-screen");
        qs.style.display = "block";
        qs.style.animation = "none";
        qs.offsetHeight;
        qs.style.animation = "fadeUp 0.5s ease both";
        const labels = {
          easy: "🌱 Mudah",
          medium: "⚔️ Sedang",
          hard: "🔥 Sulit",
        };
        const badge = document.getElementById("badge-level");
        badge.textContent = labels[selectedLevel];
        badge.className = "badge " + selectedLevel;
        renderQuestion();
      }

      function renderQuestion() {
        const q = questions[currentIdx],
          total = questions.length;
        document.getElementById("question-num").textContent =
          `Soal ${currentIdx + 1} dari ${total}`;
        document.getElementById("question-text").textContent = q.q;
        document.getElementById("progress-bar").style.width =
          `${(currentIdx / total) * 100}%`;
        document.getElementById("score-live").textContent = `Skor: ${score}`;
        const grid = document.getElementById("options-grid");
        grid.innerHTML = "";
        q.opts.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span>${opt}`;
          btn.onclick = () => selectAnswer(i, btn, q.ans);
          grid.appendChild(btn);
        });
        const fb = document.getElementById("feedback-box");
        fb.className = "feedback-box";
        fb.textContent = "";
        document.getElementById("btn-next").classList.remove("visible");
      }

      function selectAnswer(idx, btn, correctIdx) {
        document
          .querySelectorAll(".option-btn")
          .forEach((b) => (b.disabled = true));
        const fb = document.getElementById("feedback-box");
        const pts = { easy: 10, medium: 20, hard: 30 }[selectedLevel];
        if (idx === correctIdx) {
          btn.classList.add("correct");
          score += pts;
          correct++;
          fb.className = "feedback-box correct-fb show";
          fb.innerHTML = `✅ Benar! +${pts} poin`;
        } else {
          btn.classList.add("wrong");
          document
            .querySelectorAll(".option-btn")
            [correctIdx].classList.add("correct");
          wrong++;
          fb.className = "feedback-box wrong-fb show";
          fb.innerHTML = `❌ Salah! Jawaban benar: <strong>${questions[currentIdx].opts[correctIdx]}</strong>`;
        }
        document.getElementById("score-live").textContent = `Skor: ${score}`;
        const btnNext = document.getElementById("btn-next");
        btnNext.classList.add("visible");
        btnNext.textContent =
          currentIdx === questions.length - 1
            ? "🏁 Lihat Hasil"
            : "Pertanyaan Berikutnya →";
      }

      function nextQuestion() {
        currentIdx++;
        if (currentIdx >= questions.length) showResult();
        else renderQuestion();
      }

      function showResult() {
        document.getElementById("quiz-screen").style.display = "none";
        const rs = document.getElementById("result-screen");
        rs.style.display = "block";
        rs.style.animation = "none";
        rs.offsetHeight;
        rs.style.animation = "fadeUp 0.6s ease both";
        const pct = Math.round((correct / questions.length) * 100);
        document.getElementById("score-display").textContent = score;
        document.getElementById("stat-benar").textContent = correct;
        document.getElementById("stat-salah").textContent = wrong;
        document.getElementById("stat-total").textContent = questions.length;
        let trophy, title, msg;
        if (pct === 100) {
          trophy = "🏆";
          title = "Sempurna!";
          msg =
            "Luar biasa! Semua jawaban benar. Kamu adalah ahli sejarah sejati!";
        } else if (pct >= 80) {
          trophy = "🥇";
          title = "Hebat!";
          msg =
            "Pengetahuan sejarahmu sangat baik. Sedikit lagi menuju kesempurnaan!";
        } else if (pct >= 60) {
          trophy = "🥈";
          title = "Bagus!";
          msg = "Cukup baik! Terus belajar untuk hasil yang lebih baik.";
        } else if (pct >= 40) {
          trophy = "🥉";
          title = "Lumayan!";
          msg =
            "Kamu perlu lebih banyak membaca tentang sejarah dunia. Coba lagi!";
        } else {
          trophy = "📚";
          title = "Terus Belajar!";
          msg =
            "Jangan menyerah! Baca lebih banyak tentang sejarah dan coba kembali.";
        }
        document.getElementById("trophy-icon").textContent = trophy;
        document.getElementById("result-title").textContent = title;
        document.getElementById("result-message").textContent = msg;
      }

      function restartQuiz() {
        document.getElementById("result-screen").style.display = "none";
        const hs = document.getElementById("home-screen");
        hs.style.display = "block";
        hs.style.animation = "none";
        hs.offsetHeight;
        hs.style.animation = "fadeUp 0.5s ease both";
        document
          .querySelectorAll(".diff-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("btn-start").disabled = true;
        selectedLevel = null;
      }
    </script>
  </body>
</html>
